# config/settings.yaml
# ─────────────────────────────────────────────
# Central configuration for the RAG pipeline.
# All paths are relative to the project root.
# ─────────────────────────────────────────────

project:
  name: "Enterprise RAG System"
  version: "1.0.0"

paths:
  raw_data:       "data/raw"
  processed_data: "data/processed"
  chroma_db:      "data/chroma_db"
  sqlite_db:      "data/metadata.db"
  mlflow_uri:     "mlruns"

ingestion:
  supported_extensions: [".pdf", ".csv", ".txt", ".html", ".md"]
  batch_size: 50                 # Documents per ingestion batch

chunking:
  chunk_size: 512                # Characters per chunk
  chunk_overlap: 64              # Overlap between consecutive chunks
  separators: ["\n\n", "\n", ". ", " ", ""]

embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  # Free, 384-dim, runs fully offline after first download (~90MB)
  device: "cpu"                  # Change to "cuda" if GPU available
  batch_size: 64

vectorstore:
  collection_name: "enterprise_docs"
  distance_metric: "cosine"
  # Hybrid search weights (must sum to 1.0)
  dense_weight: 0.7
  sparse_weight: 0.3             # BM25

retrieval:
  top_k: 10                      # Candidates before re-ranking
  mmr_lambda: 0.5                # 0 = max diversity, 1 = max relevance
  final_k: 4                     # Final chunks returned after MMR

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"

# ── PHASE 2 ───────────────────────────────────────────────────────────────────

llm:
  # Ollama runs locally — install from https://ollama.com then: ollama pull mistral
  provider: "ollama"
  model: "mistral"
  base_url: "http://localhost:11434"
  temperature: 0.1          # Low = factual, deterministic answers
  max_tokens: 1024

reranker:
  # Free HuggingFace cross-encoder — downloaded once (~80MB), runs offline
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 4                  # Final chunks after re-ranking
  device: "cpu"

query_rewriting:
  enabled: true
  num_variants: 3           # How many rewritten queries to generate

rag:
  # Persona options: "analyst", "executive", "engineer", "hr"
  default_persona: "analyst"
  max_context_chars: 6000   # Total chars fed to LLM (stay under context window)
  cite_sources: true        # Append [source: filename, page N] to answers